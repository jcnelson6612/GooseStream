<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Park Soundscape | Scroll to Explore</title>
    <style>
        :root {
            --text-color: #ffffff;
            --accent-color: rgba(255, 255, 255, 0.2);
            --blur-bg: rgba(0, 0, 0, 0.3);
        }

        /* We make the body incredibly tall so the user has plenty of room to scroll.
           The actual content will be 'fixed' so it stays on screen.
        */
        body {
            margin: 0;
            padding: 0;
            height: 500vh; /* 5x the viewport height for scroll room */
            background-color: #0a0f24; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none; /* Prevents bounce effects on Mac/iOS */
        }

        /* The container that stays locked to the screen */
        #viewport {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh; /* Fallback for older browsers */
            height: 100dvh; /* Dynamic viewport prevents mobile address bar jumping */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(to bottom, rgb(135, 206, 235), rgb(200, 230, 250)); /* Default, overwritten by JS */
            transition: background 0.1s ease;
            z-index: 1;
        }

        /* Styling for the premium, Apple-esque typography */
        .glass-panel {
            background: var(--blur-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 4rem;
            border-radius: 32px;
            text-align: center;
            color: var(--text-color);
            border: 1px solid rgba(255,255,255,0.1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            width: 90%;
            max-width: 500px;
            transform: translateY(0);
            transition: transform 0.1s ease-out;
        }

        .instruction {
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.7;
            margin-bottom: 1rem;
            font-weight: 600;
        }

        .clock-display {
            font-size: 5.5rem;
            font-variant-numeric: tabular-nums;
            font-weight: 700;
            letter-spacing: -3px;
            margin: 0;
            line-height: 1;
            text-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .status-text {
            font-size: 1rem;
            opacity: 0.8;
            margin-top: 1.5rem;
            min-height: 1.5rem;
        }

        button {
            margin-top: 2rem;
            padding: 16px 40px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            border: none;
            background: #ffffff;
            color: #000000;
            border-radius: 50px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 25px rgba(0,0,0,0.3);
        }
        
        button:disabled {
            background: rgba(255,255,255,0.5);
            cursor: not-allowed;
            transform: scale(1);
        }

        /* Visual scroll indicator line on the left */
        #scroll-progress-container {
            position: fixed;
            left: 2rem;
            top: 50%;
            transform: translateY(-50%);
            height: 60vh;
            width: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            z-index: 2;
        }

        #scroll-progress-bar {
            width: 100%;
            height: 0%; /* updated by JS */
            background: #ffffff;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Mobile specific adjustments */
        @media (max-width: 600px) {
            .clock-display {
                font-size: 3.5rem; /* Prevent overflow on narrow screens */
            }
            .glass-panel {
                padding: 2.5rem 1.5rem;
                width: 85%;
            }
            #scroll-progress-container {
                left: 1rem; /* Move indicator closer to edge on small screens */
            }
            button {
                padding: 14px 30px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Fixed UI Layer -->
    <div id="viewport">
        <div class="glass-panel" id="ui-panel">
            <div class="instruction">Scroll to explore time</div>
            <div class="clock-display" id="clock">06:00:00</div>
            <div class="status-text" id="statusText">Ready.</div>
            <button id="playBtn">Listen to the Park</button>
        </div>
    </div>

    <!-- Progress Indicator -->
    <div id="scroll-progress-container">
        <div id="scroll-progress-bar"></div>
    </div>

    <audio id="player" preload="metadata"></audio>

    <script>
        // --- 1. Master Configuration ---
        const rawAudioData = [
            { filename: "20260423_102404.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777072532/20260423_102404_ps0zw6.mp3", durationSec: 10800 },
            { filename: "20260423_132404.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777073118/20260423_132404_x4adwo.mp3", durationSec: 11539 },
            { filename: "20260423_163650.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777075693/20260423_163650_fgydtg.mp3", durationSec: 10800 },
            { filename: "20260423_193650.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777075693/20260423_163650_fgydtg.mp3", durationSec: 11564 },
            { filename: "20260423_224936.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777075693/20260423_163650_fgydtg.mp3", durationSec: 10800 },
            { filename: "20260423_014936.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777075688/20260424_014936_ldy4xi.mp3", durationSec: 11564 },
            { filename: "20260423_050222.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777075691/20260424_050222_zdkfmw.mp3", durationSec: 10800 },
            { filename: "20260423_080222.mp3", url: "https://res.cloudinary.com/dxvjtqgka/video/upload/v1777075683/20260424_080222_ho44cg.mp3", durationSec: 11561 },

        ];

        // 6:00 AM in seconds. Top of the page maps to this time.
        const START_OFFSET_SEC = 21600; 
        const DAY_DURATION_SEC = 86400;

        // Color stops for the background gradient based on time of day (RGB values)
        const skyColors = [
            { sec: 0,     rgb: [10, 15, 36] },      // Midnight: Deep Navy
            { sec: 21600, rgb: [255, 154, 118] },   // 6 AM: Dawn Peach
            { sec: 43200, rgb: [115, 190, 245] },   // Noon: Bright Sky Blue
            { sec: 64800, rgb: [75, 59, 105] },     // 6 PM: Dusk Purple
            { sec: 86400, rgb: [10, 15, 36] }       // Midnight (Wrap)
        ];

        // --- 2. Initialization ---
        function parseTimeToSeconds(filename) {
            const timePart = filename.split('_')[1].split('.')[0]; 
            const h = parseInt(timePart.substring(0, 2), 10);
            const m = parseInt(timePart.substring(2, 4), 10);
            const s = parseInt(timePart.substring(4, 6), 10);
            return (h * 3600) + (m * 60) + s;
        }

        const audioSchedule = rawAudioData.map(file => {
            const startSec = parseTimeToSeconds(file.filename);
            return { ...file, startSec: startSec, endSec: startSec + file.durationSec };
        }).sort((a, b) => {
            // Sort chronologically by time of day first
            if (a.startSec !== b.startSec) {
                return a.startSec - b.startSec;
            }
            // If the time of day is exactly the same, favor the earlier date.
            // Since filenames are 'YYYYMMDD_HHMMSS', alphabetical sorting naturally puts earlier dates first.
            return a.filename.localeCompare(b.filename);
        });

        // --- 3. DOM Elements & Global State ---
        const player = document.getElementById('player');
        const playBtn = document.getElementById('playBtn');
        const clock = document.getElementById('clock');
        const statusText = document.getElementById('statusText');
        const viewport = document.getElementById('viewport');
        const progressBar = document.getElementById('scroll-progress-bar');
        const uiPanel = document.getElementById('ui-panel');
        
        let currentTrackIndex = -1;
        let isPlayingContextUnlocked = false; // Tracks if the user has clicked play at least once

        // Scroll & Smoothing State
        let targetScroll = 0;
        let currentScroll = 0;
        let isUserScrolling = false;
        let scrollTimeout;
        
        // Audio Fade State
        let volumeTarget = 1.0;
        player.volume = 1.0;

        // Wake Lock State
        let wakeLock = null;

        // --- 4. Smooth Scrolling Logic & Time Calculation ---

        function formatTime(totalSeconds) {
            const h = String(Math.floor(totalSeconds / 3600)).padStart(2, '0');
            const m = String(Math.floor((totalSeconds % 3600) / 60)).padStart(2, '0');
            const s = String(Math.floor(totalSeconds % 60)).padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        // Linear Interpolation for Colors
        function lerpColor(c1, c2, factor) {
            return [
                Math.round(c1[0] + factor * (c2[0] - c1[0])),
                Math.round(c1[1] + factor * (c2[1] - c1[1])),
                Math.round(c1[2] + factor * (c2[2] - c1[2]))
            ];
        }

        function updateSkyColor(virtualSeconds) {
            let startColor, endColor, factor;
            
            // Find which two color stops we are between
            for (let i = 0; i < skyColors.length - 1; i++) {
                if (virtualSeconds >= skyColors[i].sec && virtualSeconds <= skyColors[i+1].sec) {
                    startColor = skyColors[i];
                    endColor = skyColors[i+1];
                    const range = endColor.sec - startColor.sec;
                    factor = (virtualSeconds - startColor.sec) / range;
                    break;
                }
            }
            
            if (!startColor) return; // Fallback
            
            const currentRgb = lerpColor(startColor.rgb, endColor.rgb, factor);
            const darkerRgb = currentRgb.map(c => Math.max(0, c - 40)); // Create a subtle gradient
            
            viewport.style.background = `linear-gradient(to bottom, rgb(${currentRgb.join(',')}), rgb(${darkerRgb.join(',')}))`;
        }

        // Map scroll percentage to time of day
        function getVirtualSecondsFromScroll(scrollProgress) {
            return Math.floor((START_OFFSET_SEC + (scrollProgress * DAY_DURATION_SEC)) % DAY_DURATION_SEC);
        }

        // Detect actual hardware interactions (wheel, touch) to separate from programmatic scrolling
        function flagUserInteraction() {
            isUserScrolling = true;
            volumeTarget = 0; // Fade out immediately when scrubbing
            
            clearTimeout(scrollTimeout);
            // Wait 250ms after the last scroll event to declare scrolling "finished"
            scrollTimeout = setTimeout(() => {
                isUserScrolling = false;
                handleScrollEnded();
            }, 250); 
        }

        window.addEventListener('wheel', flagUserInteraction, {passive: true});
        window.addEventListener('touchstart', flagUserInteraction, {passive: true});
        window.addEventListener('touchmove', flagUserInteraction, {passive: true});

        // Track the target destination of the scrollbar
        window.addEventListener('scroll', () => {
            targetScroll = window.scrollY;
        });

        // --- 5. The Animation Loop (60fps) ---
        function renderLoop() {
            // 1. Smoothly interpolate the current visual scroll toward the actual scrollbar
            currentScroll += (targetScroll - currentScroll) * 0.08; 

            // 2. Calculate progress (0.0 to 1.0)
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            let progress = currentScroll / maxScroll;
            if (progress < 0) progress = 0;
            if (progress > 1) progress = 1;

            // 3. Update the UI
            const virtualSeconds = getVirtualSecondsFromScroll(progress);
            clock.textContent = formatTime(virtualSeconds);
            progressBar.style.height = `${progress * 100}%`;
            updateSkyColor(virtualSeconds);

            // Create a subtle parallax effect on the UI panel based on scroll velocity
            const scrollVelocity = targetScroll - currentScroll;
            uiPanel.style.transform = `translateY(${scrollVelocity * 0.1}px)`;

            // 4. Smoothly interpolate Audio Volume
            if (Math.abs(player.volume - volumeTarget) > 0.01) {
                player.volume += (volumeTarget - player.volume) * 0.1;
            } else {
                player.volume = volumeTarget;
            }

            // 5. Auto-scroll the page if audio is playing naturally
            if (!player.paused && !isUserScrolling && currentTrackIndex !== -1) {
                const track = audioSchedule[currentTrackIndex];
                // Apply modulo to seamlessly handle passing midnight internal to playback
                const realVirtualSeconds = (track.startSec + player.currentTime) % DAY_DURATION_SEC;
                
                let elapsedFromStart = realVirtualSeconds - START_OFFSET_SEC;
                if (elapsedFromStart < 0) elapsedFromStart += DAY_DURATION_SEC;
                
                const autoProgress = elapsedFromStart / DAY_DURATION_SEC;
                targetScroll = autoProgress * maxScroll;
                window.scrollTo(0, targetScroll); // Keeps the physical scrollbar in sync
            }

            requestAnimationFrame(renderLoop);
        }

        // --- 6. Audio Seeking Logic ---

        // Called only when the user STOPS actively scrolling
        function handleScrollEnded() {
            const maxScroll = document.body.scrollHeight - window.innerHeight;
            const progress = targetScroll / maxScroll;
            const targetSeconds = getVirtualSecondsFromScroll(progress);

            // Find if there is audio for this exact second
            let foundTrackIndex = -1;
            let offsetInFile = 0;
            
            for (let i = 0; i < audioSchedule.length; i++) {
                const track = audioSchedule[i];
                
                // Normal chronological bounds check
                if (targetSeconds >= track.startSec && targetSeconds < track.endSec) {
                    foundTrackIndex = i;
                    offsetInFile = targetSeconds - track.startSec;
                    break;
                }
                
                // Wrap-around bounds check (handles files that play across midnight)
                if (track.endSec > DAY_DURATION_SEC && targetSeconds < (track.endSec - DAY_DURATION_SEC)) {
                    foundTrackIndex = i;
                    offsetInFile = targetSeconds + DAY_DURATION_SEC - track.startSec;
                    break;
                }
            }

            if (foundTrackIndex === -1) {
                // Landed in a gap where no recording exists
                player.pause();
                statusText.textContent = "No audio recorded for this time.";
                playBtn.disabled = true;
                volumeTarget = 0;
                return;
            }

            playBtn.disabled = false;
            statusText.textContent = "Loading environment...";
            
            const track = audioSchedule[foundTrackIndex];

            if (currentTrackIndex !== foundTrackIndex) {
                player.src = track.url;
                currentTrackIndex = foundTrackIndex;
            }

            player.currentTime = offsetInFile;

            // Only attempt to auto-resume if they've clicked the button at least once
            if (isPlayingContextUnlocked && playBtn.textContent === "Pause") {
                player.play().then(() => {
                    volumeTarget = 1.0; // Fade back in
                    statusText.textContent = "";
                }).catch(() => console.log("Play interrupted."));
            } else {
                statusText.textContent = "Ready.";
            }
        }

        // --- 7. Button Listeners ---

        // Screen Wake Lock API to prevent phone from sleeping while listening
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    wakeLock = await navigator.wakeLock.request('screen');
                } catch (err) {
                    console.log('Wake Lock error:', err);
                }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release()
                    .then(() => wakeLock = null)
                    .catch(err => console.log('Wake Lock release error:', err));
            }
        }

        // Re-request wake lock if user switches tabs and comes back
        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && !player.paused) {
                await requestWakeLock();
            }
        });

        playBtn.addEventListener('click', () => {
            isPlayingContextUnlocked = true; // Unlocks browser audio restrictions
            
            if (player.paused) {
                if (currentTrackIndex === -1) {
                    // First time pressing play, load based on where they are scrolled
                    handleScrollEnded();
                } 
                player.play();
                volumeTarget = 1.0;
                requestWakeLock();
            } else {
                player.pause();
                volumeTarget = 0;
                releaseWakeLock();
            }
        });

        player.addEventListener('play', () => {
            playBtn.textContent = "Pause";
            statusText.textContent = "";
        });
        
        player.addEventListener('pause', () => {
            playBtn.textContent = "Listen to the Park";
        });
        
        player.addEventListener('waiting', () => {
            if (!isUserScrolling) statusText.textContent = "Buffering audio...";
        });
        
        player.addEventListener('playing', () => {
            statusText.textContent = "";
        });

        player.addEventListener('ended', () => {
            // Find exactly where we are on the daily timeline when a track wraps up
            const track = audioSchedule[currentTrackIndex];
            const targetSeconds = track.endSec % DAY_DURATION_SEC;

            let foundTrackIndex = -1;
            let offsetInFile = 0;
            
            for (let i = 0; i < audioSchedule.length; i++) {
                const checkTrack = audioSchedule[i];
                if (targetSeconds >= checkTrack.startSec && targetSeconds < checkTrack.endSec) {
                    foundTrackIndex = i;
                    offsetInFile = targetSeconds - checkTrack.startSec;
                    break;
                }
                if (checkTrack.endSec > DAY_DURATION_SEC && targetSeconds < (checkTrack.endSec - DAY_DURATION_SEC)) {
                    foundTrackIndex = i;
                    offsetInFile = targetSeconds + DAY_DURATION_SEC - checkTrack.startSec;
                    break;
                }
            }

            if (foundTrackIndex !== -1) {
                // Instantly pivot playback to the next logical block without waiting for user scroll
                currentTrackIndex = foundTrackIndex;
                player.src = audioSchedule[currentTrackIndex].url;
                player.currentTime = offsetInFile;
                player.play();
            } else {
                // Legitimate gap reached naturally during playback
                statusText.textContent = "No audio recorded for this time.";
                playBtn.disabled = true;
                playBtn.textContent = "Listen to the Park";
                volumeTarget = 0;
            }
        });

        // Boot Up
        requestAnimationFrame(renderLoop);
        updateSkyColor(START_OFFSET_SEC);

    </script>
</body>
</html>
